# Render.com Blueprint (备用平台配置，当前使用 Railway)
# 如需迁移到 Render: 在 Render Dashboard 手动设置下面标记 sync:false 的环境变量
services:
  - type: web
    name: exam-platform-api
    runtime: docker
    repo: https://github.com/fsbrm/exam-platform
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: cloud
      - key: MYSQLHOST
        sync: false
      - key: MYSQLPORT
        sync: false
      - key: MYSQLDATABASE
        sync: false
      - key: MYSQLUSER
        sync: false
      - key: MYSQLPASSWORD
        sync: false
      - key: REDISHOST
        sync: false
      - key: REDISPORT
        sync: false
      - key: REDISPASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
    plan: free
