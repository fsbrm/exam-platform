# Cloud/Railway deployment profile
spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
  data:
    redis:
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDISPASSWORD}
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:exam-platform-cloud-jwt-secret-key-2026}
  expiration: 86400000

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
