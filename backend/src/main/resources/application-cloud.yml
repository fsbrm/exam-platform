# Cloud deployment profile - values from environment variables
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/exam_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

jwt:
  secret: ${JWT_SECRET:exam-platform-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
