# Cloud/Railway deployment profile
spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:exam_platform}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true
    username: ${MYSQLUSER:root}
    password: ${MYSQLPASSWORD:}
  data:
    redis:
      host: ${REDISHOST:localhost}
      port: ${REDISPORT:6379}
      password: ${REDISPASSWORD:}
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:exam-platform-secret-key}
  expiration: 86400000

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}